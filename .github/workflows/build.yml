name: Build Hyprland 0.54.0

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            gcc-14 g++-14 cmake ninja-build meson git pkg-config \
            libpixman-1-dev libcairo2-dev libjpeg-dev libwebp-dev \
            libmagic-dev libpng-dev librsvg2-dev libpango1.0-dev \
            libgles2-mesa-dev libgl-dev libdrm-dev libgbm-dev \
            libinput-dev libudev-dev libseat-dev libpam0g-dev \
            libdisplay-info-dev libpipewire-0.3-dev libspa-0.2-dev \
            libdbus-1-dev libsystemd-dev libwayland-dev wayland-protocols \
            libwayland-egl-backend-dev libxcb1-dev libxcb-composite0-dev \
            libxcb-damage0-dev libxcb-dri3-dev libxcb-ewmh-dev \
            libxcb-icccm4-dev libxcb-present-dev libxcb-randr0-dev \
            libxcb-render-util0-dev libxcb-render0-dev libxcb-res0-dev \
            libxcb-shm0-dev libxcb-util-dev libxcb-xfixes0-dev \
            libxcb-xinput-dev libxcb-xkb-dev libxcb-xtest0-dev \
            libx11-dev libx11-xcb-dev libxcursor-dev libxcomposite-dev \
            libxdamage-dev libxext-dev libxfixes-dev libxi-dev \
            libxinerama-dev libxrandr-dev libxrender-dev libxtst-dev \
            xwayland glslang-tools spirv-tools libvulkan-dev \
            libsdbus-c++-dev libtomlplusplus-dev libzip-dev \
            libpugixml-dev libre2-dev libmuparser-dev libgtk-3-dev \
            libmtdev-dev libevdev-dev bison autoconf automake libtool \
            xcb-proto libxcb-util-dev xutils-dev libffi-dev libexpat1-dev
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 14
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 14

      - name: Install CMake 3.31
        run: |
          wget -q https://github.com/Kitware/CMake/releases/download/v3.31.6/cmake-3.31.6-linux-x86_64.sh
          sudo bash cmake-3.31.6-linux-x86_64.sh --skip-license --prefix=/usr/local
          cmake --version

      - name: Set env
        run: |
          set -e
          echo "CC=gcc-14" >> $GITHUB_ENV
          echo "CXX=g++-14" >> $GITHUB_ENV
          echo "PREFIX=/opt/hypr" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/lib/x86_64-linux-gnu/pkgconfig:/opt/hypr/lib/pkgconfig:/opt/hypr/lib/x86_64-linux-gnu/pkgconfig:/opt/hypr/share/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=/usr/local:/opt/hypr" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/local/lib:/opt/hypr/lib:/opt/hypr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "/opt/hypr/bin" >> $GITHUB_PATH
          sudo mkdir -p /opt/hypr
          sudo chown runner:runner /opt/hypr

      - name: Build hyprutils
        run: |
          git clone --depth=1 https://github.com/hyprwm/hyprutils.git
          cd hyprutils
          sed -i 's/fcntl(m_impl->m_logOfs.native_handle(), F_SETFD, FD_CLOEXEC);//' src/cli/Logger.cpp
          cmake --no-warn-unused-cli -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 -S . -B build
          cmake --build build -j$(nproc)
          cmake --install build

      - name: Build hyprlang
        run: |
          git clone --depth=1 https://github.com/hyprwm/hyprlang.git
          cd hyprlang
          cmake --no-warn-unused-cli -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 -S . -B build
          cmake --build build -j$(nproc)
          cmake --install build

      - name: Build hyprcursor
        run: |
          git clone --depth=1 https://github.com/hyprwm/hyprcursor.git
          cd hyprcursor
          cmake --no-warn-unused-cli -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 -S . -B build
          cmake --build build -j$(nproc)
          cmake --install build

      - name: Build hyprgraphics
        run: |
          git clone --depth=1 https://github.com/hyprwm/hyprgraphics.git
          cd hyprgraphics
          cmake --no-warn-unused-cli -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 -S . -B build
          cmake --build build -j$(nproc)
          cmake --install build

      - name: Build hyprwayland-scanner
        run: |
          git clone --depth=1 https://github.com/hyprwm/hyprwayland-scanner.git
          cd hyprwayland-scanner
          cmake --no-warn-unused-cli -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 -S . -B build
          cmake --build build -j$(nproc)
          cmake --install build
          which hyprwayland-scanner && echo SCANNER_OK

      - name: Add /opt/hypr/bin to PATH
        run: echo "/opt/hypr/bin" >> $GITHUB_PATH

      - name: Build wayland 1.23.1
        run: |
          for i in 1 2 3; do
            git clone --depth=1 --branch 1.23.1 https://gitlab.freedesktop.org/wayland/wayland.git && break
            echo "Clone attempt $i failed, retrying in 15s..."
            sleep 15
          done
          cd wayland
          meson setup build --prefix=$PREFIX -Ddocumentation=false -Dtests=false
          ninja -C build -j$(nproc)
          ninja -C build install

      - name: Build libinput 1.28.1
        run: |
          for i in 1 2 3; do
            git clone --depth=1 --branch 1.28.1 https://gitlab.freedesktop.org/libinput/libinput.git && break
            echo "Clone attempt $i failed, retrying in 15s..."
            sleep 15
          done
          cd libinput
          meson setup build --prefix=/usr/local -Ddocumentation=false -Dtests=false -Dlibwacom=false
          ninja -C build -j$(nproc)
          sudo ninja -C build install
          sudo ldconfig

      - name: Build xkbcommon 1.11.0
        run: |
          git clone --depth=1 --branch xkbcommon-1.11.0 https://github.com/xkbcommon/libxkbcommon.git
          cd libxkbcommon
          meson setup build --prefix=$PREFIX -Denable-docs=false -Denable-tools=false
          ninja -C build -j$(nproc)
          ninja -C build install

      - name: Build aquamarine
        run: |
          set -e
          export PATH="/opt/hypr/bin:$PATH"
          which hyprwayland-scanner && echo "hyprwayland-scanner OK"
          pkg-config --modversion libinput
          git clone --depth=1 https://github.com/hyprwm/aquamarine.git
          cd aquamarine
          # Remove test block but keep Installation block
          sed -i '/^# tests/,/^# Installation/{/^# Installation/!d}' CMakeLists.txt
          cmake --no-warn-unused-cli \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_PREFIX_PATH=$PREFIX \
            -S . -B build
          cmake --build build -j$(nproc)
          cmake --install build
          mkdir -p $PREFIX/lib/pkgconfig
          cp build/aquamarine.pc $PREFIX/lib/pkgconfig/aquamarine.pc
          pkg-config --modversion aquamarine

      - name: Build hyprwire
        run: |
          set -e
          git clone --depth=1 https://github.com/hyprwm/hyprwire.git
          cd hyprwire
          # Replace C++23 append_range with compatible insert for gcc-14/C++23 stdlibc++ missing ranges support
          find src -name '*.cpp' -o -name '*.hpp' | xargs perl -i -pe \
            's/(\w[\w.>*]+)\.append_range\(([^;]+)\);/\1.insert(\1.end(), \2.begin(), \2.end());/g'
          cmake --no-warn-unused-cli -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14 -DCMAKE_CXX_STANDARD=23 -S . -B build
          cmake --build build -j$(nproc)
          cmake --install build

      - name: Build xcb-errors
        run: |
          sudo apt-get install -y -qq xcb-proto xutils-dev
          git clone --depth=1 https://gitlab.freedesktop.org/xorg/lib/libxcb-errors.git
          cd libxcb-errors
          autoreconf -fi
          ./configure --prefix=$PREFIX
          make -j$(nproc)
          make install

      - name: Build hyprland-protocols
        run: |
          git clone --depth=1 https://github.com/hyprwm/hyprland-protocols.git
          cd hyprland-protocols
          cmake --no-warn-unused-cli \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -S . -B build
          cmake --install build

      - name: Build Hyprland 0.54.0
        run: |
          set -e
          export PKG_CONFIG_PATH="/opt/hypr/lib/pkgconfig:/opt/hypr/lib/x86_64-linux-gnu/pkgconfig:/opt/hypr/share/pkgconfig:/usr/local/lib/pkgconfig:/usr/local/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/lib/pkgconfig"
          export PATH="/opt/hypr/bin:$PATH"
          git clone --depth=1 --branch v0.54.0 https://github.com/hyprwm/Hyprland.git
          cd Hyprland
          git submodule update --init --recursive
          cmake --no-warn-unused-cli \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_PREFIX_PATH="/opt/hypr;/usr/local" \
            -S . -B build
          cmake --build build -j$(nproc)
          cmake --install build

      - name: Build xdg-desktop-portal-hyprland
        run: |
          set -e
          git clone --depth=1 --recursive https://github.com/hyprwm/xdg-desktop-portal-hyprland.git
          cd xdg-desktop-portal-hyprland
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_PREFIX_PATH=$PREFIX \
            -DCMAKE_INSTALL_LIBEXECDIR=$PREFIX/lib \
            -DCMAKE_INSTALL_PREFIX=$PREFIX \
            -B build
          cmake --build build -j$(nproc)
          cmake --install build

      - name: Package artifacts
        run: |
          sudo ldconfig
          tar -czf hyprland-0.54.0-ubuntu24-x86_64.tar.gz -C / opt/hypr
          ls -lh hyprland-0.54.0-ubuntu24-x86_64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyprland-0.54.0-ubuntu24-x86_64
          path: hyprland-0.54.0-ubuntu24-x86_64.tar.gz
          retention-days: 7
